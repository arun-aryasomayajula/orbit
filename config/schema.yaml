# Orbit project profile — the contract for `<target-repo>/.autopilot/config.yaml`.
# This file documents every field. `orbit doctor` validates a real config against it.
# The ENGINE is generic; ALL project-specific knowledge lives in the target's .autopilot/.
#
# Required: repo, base_branch, gates. Everything else has a default.

# --- identity -----------------------------------------------------------------
repo: "."                    # target repo path. "." = the dir containing .autopilot/. Absolute also fine.
base_branch: "main"          # the loop resets a worktree to origin/<base_branch> each cycle and
                             # forks per-task branches from it. NEVER pushed to directly.

# --- the model + posture ------------------------------------------------------
model: "claude-opus-4-8"     # orchestrator model (env AP_MODEL overrides). Makers may downgrade per router.
permission_mode: "acceptEdits"   # claude --permission-mode. Deletes/push stay denied via the settings file.
interval_seconds: 180        # sleep between cycles
max_tasks_per_day: 12        # hard daily cap (failed cycles count too)
cycle_timeout_seconds: 3600  # watchdog kill per cycle

# --- where the human gates live ------------------------------------------------
dashboard_url: "http://127.0.0.1:8787"   # linked from Slack notifications + the digest, so every
                                         # merge/escalation decision is one tap away. Change it if the
                                         # dashboard is reachable at another address (tailscale etc.).

# --- the spec the cycle re-reads each run (optional) --------------------------
spec: null                   # e.g. "docs/VISION.md" — a standing spec the orchestrator rereads so it
                             # doesn't drift. null = no standing spec (task contracts alone govern).

# --- GATES: the whole decoupling. How the checker verifies THIS repo. ---------
# The checker runs each gate's `cmd` in `cwd` (relative to repo) and must see it pass
# before a task is committed. `needs` lists preflight deps the loop checks are up first
# (built-in checks: postgres, mysql, redis, docker, node, python). An unknown `needs`
# value is treated as a shell test: `<value>` must exit 0.
gates:
  # example — replace with your repo's real gates (orbit init auto-detects these):
  test:
    cmd: "pytest -q"
    cwd: "."
    needs: []              # e.g. [postgres]
  # frontend:
  #   cmd: "npm test -- --watchAll=false"
  #   cwd: "frontend"
  # typecheck:
  #   cmd: "npm run typecheck"
  #   cwd: "frontend"

# --- WORKABLE categories (auto-pickable). Others escalate unless forced. -------
# The router (router.yaml, engine default overridable per-repo) maps each category to
# maker/model/skill/tracks. This just says which the loop may AUTO-pick.
workable_categories: [bug, feature, refactor, code_quality, testing, documentation, dependencies, developer_experience]

# --- task sources feeding the backlog -----------------------------------------
# `backlog` is native (a human-curated backlog.yaml). Every other name is a SIGNAL
# adapter `<name>_to_backlog.py` — resolved from the target's .autopilot/adapters/
# first (ship your own feeds), then the engine's adapters/. Adapters append
# `status: proposed` tasks only; a human queues work. Contract details:
# backlog_to_tasks.run_source_adapters.
sources: [backlog]           # + optional: foundry, logwatch, qa, or your own

# --- environment passthrough (NEVER commit secrets; reference env only) -------
env:
  # CLAUDE_BIN: "auto"       # "auto" = command -v claude. Or an absolute path.
  # extra_ca_certs: null     # path to a corporate root CA (Zscaler etc.) if outbound TLS needs it
  # passthrough: []          # names of env vars to export into the cycle (e.g. TRINO_HOST) — values from your shell, not here

# --- git identity for the wrapper's per-task branches -------------------------
branch_prefix: "autopilot"   # ships push to origin/<branch_prefix>/task-<id>
commit_trailer: "Co-Authored-By: Claude <noreply@anthropic.com>"

# --- runtime verification (optional): prove ships in the RUNNING product -------
# After the cycle commits and BEFORE the wrapper pushes, a runtime agent launches
# (or attaches to) the app and drives the exact flow the acceptance criteria name;
# its evidence lands in the review packet. Only listed categories are checked.
# `evidence` never blocks; `required` escalates instead of shipping when observed
# behaviour CONTRADICTS a criterion (unable-to-run is never a failure). No block
# → no runtime checks (default).
# runtime_check:
#   launch: "npm run dev"            # optional — how the agent starts the app
#   url: "http://localhost:3000"     # optional — where to reach it
#   timeout_seconds: 900
#   categories:
#     frontend: required
#     feature: evidence

# --- jira as a task source (optional, wrapper-only credentials) ----------------
# Requires `jira` in sources: above. A human applying `ready_label` to a ticket is
# the triage act: the adapter exports the ticket, an enrichment agent surveys the
# code and drafts a gated task contract (or comments specific questions back on the
# ticket when it's too thin to build). Ships/merges/rejections are commented back.
# Credentials live in $AP_STATE/.jira_token (auto-gitignored) — basic: `email:api_token`
# (cloud), bearer: a PAT (server/DC). Agents never see the token; all REST is engine-side.
# jira:
#   base_url: "https://<org>.atlassian.net"
#   project: "CDP"                 # issues considered (JQL project =)
#   ready_label: "orbit-ready"     # human sets this label = human triage act
#   auth: "basic"                  # "basic" | "bearer"
#   auto_queue: false              # true → enriched, gate-passing imports land queued/allow
#                                  # (the label WAS the queue act). Merge stays human always.
#   writeback: true                # comment PR url / merged / rejected back on the ticket
#   on_merge_transition: null      # e.g. "Done" — transition applied after a merge comment
#   max_imports_per_poll: 3        # enrichment is a model call; bound it per poll
#   enrich_timeout_seconds: 900

# --- pull requests (optional, wrapper-only) ------------------------------------
# "github" → after pushing a ship, the WRAPPER (never the agent) runs `gh pr create`
# against base_branch with the review packet as the PR body, and records the URL in
# the ledger. Merging stays 100% manual — Orbit never merges. Requires an
# authenticated `gh` on PATH; if it's missing or the create fails, the cycle just
# logs and continues (the branch is pushed either way).
pull_requests: "off"         # "off" | "github"
