# Example .autopilot/config.yaml for a FastAPI + React repo (modeled on cdp-metaql).
# Copy to <your-repo>/.autopilot/config.yaml and edit. `orbit init` generates this for you.
repo: "."
base_branch: "main"
model: "claude-opus-4-8"
permission_mode: "acceptEdits"
interval_seconds: 180
max_tasks_per_day: 12
cycle_timeout_seconds: 3600

spec: "docs/VISION.md"

gates:
  backend:
    cmd: "venv/bin/python -m pytest -q"
    cwd: "."
    needs: [postgres]
  frontend:
    cmd: "CI=true npm test -- --watchAll=false"
    cwd: "frontend"
  typecheck:
    cmd: "npm run typecheck"
    cwd: "frontend"

workable_categories: [bug, feature, refactor, code_quality, testing, documentation, dependencies, developer_experience]
sources: [backlog]

env:
  passthrough: []

branch_prefix: "autopilot"
commit_trailer: "Co-Authored-By: Claude <noreply@anthropic.com>"
